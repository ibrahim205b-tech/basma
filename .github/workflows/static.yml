<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بصمة</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f5f5f5;
    direction: rtl;
}

header{
    background:#111;
    color:#fff;
    padding:15px;
    text-align:center;
    font-size:20px;
}

.search{
    padding:10px;
}

.search input{
    width:100%;
    padding:10px;
    border-radius:10px;
    border:1px solid #ccc;
}

.container{
    padding:10px;
}

.card{
    background:#fff;
    padding:15px;
    margin-bottom:10px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
    background:#111;
    color:#fff;
    border:none;
    padding:10px;
    width:100%;
    border-radius:8px;
    margin-top:10px;
}

.page{
    display:none;
    padding:15px;
}

.back{
    background:#555;
    margin-bottom:10px;
}
</style>
</head>

<body>

<header>بصمة - كل احتياجاتك بمكان واحد</header>

<!-- الصفحة الرئيسية -->
<div id="home" class="page" style="display:block;">
    <div class="search">
        <input type="text" placeholder="ابحث عن منتج...">
    </div>

    <div class="container">

        <div class="card">
            <h3>iPhone 13</h3>
            <p>السعر: 700$</p>
            <button onclick="openProduct('iPhone 13',700)">عرض</button>
        </div>

        <div class="card">
            <h3>Samsung S22</h3>
            <p>السعر: 650$</p>
            <button onclick="openProduct('Samsung S22',650)">عرض</button>
        </div>

        <div class="card">
            <h3>Headphones</h3>
            <p>السعر: 50$</p>
            <button onclick="openProduct('Headphones',50)">عرض</button>
        </div>

    </div>
</div>

<!-- صفحة المنتج -->
<div id="product" class="page">
    <button class="back" onclick="goHome()">رجوع</button>

    <h2 id="pname"></h2>
    <p>السعر: <span id="pprice"></span>$</p>

    <input id="phone" placeholder="رقم الهاتف" style="width:100%;padding:10px;margin-top:10px;">
    <input id="address" placeholder="العنوان" style="width:100%;padding:10px;margin-top:10px;">

    <button onclick="order()">اطلب الآن</button>

    <p id="msg"></p>
</div>

<script>
function openProduct(name,price){
    document.getElementById("home").style.display="none";
    document.getElementById("product").style.display="block";

    document.getElementById("pname").innerText=name;
    document.getElementById("pprice").innerText=price;
}

function goHome(){
    document.getElementById("home").style.display="block";
    document.getElementById("product").style.display="none";
}

function order(){
    let name=document.getElementById("pname").innerText;
    let phone=document.getElementById("phone").value;
    let address=document.getElementById("address").value;

    if(phone=="" || address==""){
        alert("املأ البيانات");
        return;
    }

    let orders=JSON.parse(localStorage.getItem("orders")||"[]");

    orders.push({
        product:name,
        phone:phone,
        address:address
    });

    localStorage.setItem("orders",JSON.stringify(orders));

    document.getElementById("msg").innerText="تم استلام طلبك ✔";

    document.getElementById("phone").value="";
    document.getElementById("address").value="";
}
</script>

</body>
</html>
